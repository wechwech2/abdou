name: Release Readiness

on:
  workflow_dispatch:

concurrency:
  group: release-readiness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run full check
        run: pnpm run check

      - name: Run release readiness smoke gate
        run: pnpm run test:smoke:release-readiness

      - name: Upload Smoke Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-readiness-logs-${{ github.run_id }}
          path: dist/logs
          if-no-files-found: ignore
