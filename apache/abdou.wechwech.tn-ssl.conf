<VirtualHost *:443>
    ServerName abdou.wechwech.tn
    ServerAlias www.abdou.wechwech.tn
    DocumentRoot "C:/Users/webmaster/OneDrive/Dev/abdou/dist/preview"
    Alias "/minisites/" "C:/Users/webmaster/OneDrive/Dev/abdou/dist/preview/minisites/"
    Alias "/admin" "C:/Users/webmaster/OneDrive/Dev/abdou/apps/admin-php/public"
    Alias "/api" "C:/Users/webmaster/OneDrive/Dev/abdou/apps/admin-php/public"

    SSLEngine on
    SSLCertificateFile "C:/Users/webmaster/OneDrive/Dev/abdou/certs/abdou.wechwech.tn-chain.pem"
    SSLCertificateKeyFile "C:/Users/webmaster/OneDrive/Dev/abdou/certs/abdou.wechwech.tn-key.pem"

    <Directory "C:/Users/webmaster/OneDrive/Dev/abdou/dist/preview">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    <Directory "C:/Users/webmaster/OneDrive/Dev/abdou/dist/preview/minisites">
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>
    <Directory "C:/Users/webmaster/OneDrive/Dev/abdou/apps/admin-php/public">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteRule ^/?www/minisites/(.+)$ /minisites/$1 [R=301,L,NE]
    RewriteCond %{REQUEST_URI} !^/minisites(/|$)
    RewriteCond %{REQUEST_URI} !^/admin(/|$)
    RewriteCond %{REQUEST_URI} !^/api(/|$)
    RewriteCond %{REQUEST_FILENAME} -f [OR]
    RewriteCond %{REQUEST_FILENAME} -d
    RewriteRule ^ - [L]
    RewriteCond %{REQUEST_URI} !^/minisites(/|$)
    RewriteCond %{REQUEST_URI} !^/admin(/|$)
    RewriteCond %{REQUEST_URI} !^/api(/|$)
    RewriteRule ^ /index.html [L]

    ErrorLog "logs/abdou.wechwech.tn-ssl-error.log"
    CustomLog "logs/abdou.wechwech.tn-ssl-access.log" common
</VirtualHost>
