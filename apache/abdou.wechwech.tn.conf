<VirtualHost *:80>
    ServerName abdou.wechwech.tn
    ServerAlias www.abdou.wechwech.tn
    DocumentRoot "C:/Users/webmaster/OneDrive/Dev/abdou/dist/preview"
    Alias "/api" "C:/Users/webmaster/OneDrive/Dev/abdou/apps/admin-php/public"

    Alias "/.well-known/acme-challenge/" "C:/Users/webmaster/OneDrive/Dev/abdou/public/.well-known/acme-challenge/"
    <Directory "C:/Users/webmaster/OneDrive/Dev/abdou/public/.well-known/acme-challenge/">
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    <Directory "C:/Users/webmaster/OneDrive/Dev/abdou/dist/preview">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    <Directory "C:/Users/webmaster/OneDrive/Dev/abdou/apps/admin-php/public">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]

    ErrorLog "logs/abdou.wechwech.tn-error.log"
    CustomLog "logs/abdou.wechwech.tn-access.log" common
</VirtualHost>
