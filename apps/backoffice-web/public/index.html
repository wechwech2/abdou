<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abdou Backoffice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Source+Sans+3:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <p class="hero-kicker">Abdou Platform</p>
        <h1>Backoffice Administration</h1>
        <p class="hero-subtitle">
          Edition dynamique des contenus immobiliers et pilotage des publications.
        </p>
      </header>

      <main class="panel">
        <section id="auth-card" class="card auth-card">
          <h2>Connexion</h2>
          <form id="login-form">
            <label>
              Email
              <input id="email" type="email" required value="admin@abdou.local" />
            </label>
            <label>
              Mot de passe
              <input id="password" type="password" required value="0000" />
            </label>
            <button type="submit">Se connecter</button>
          </form>
          <p id="auth-status" class="status muted">Session inactive</p>
        </section>

        <section id="workspace" class="workspace hidden">
          <div class="workspace-header">
            <h2 id="welcome">Session</h2>
            <button id="logout-btn" class="btn-outline">Se deconnecter</button>
          </div>

          <nav class="tabs">
            <button data-tab="dashboard" class="tab active">Dashboard</button>
            <button data-tab="roles" class="tab">Roles</button>
            <button data-tab="users" class="tab">Users</button>
            <button data-tab="clients" class="tab">Clients</button>
            <button data-tab="templates" class="tab">Templates</button>
            <button data-tab="offres" class="tab">Offres</button>
            <button data-tab="programmes" class="tab">Programmes</button>
            <button data-tab="rubriques" class="tab">Rubriques</button>
            <button data-tab="medias" class="tab">Medias</button>
            <button data-tab="lots" class="tab">Lots</button>
            <button data-tab="publications" class="tab">Publications</button>
          </nav>

          <section id="dashboard" class="tab-panel active"></section>
          <section id="roles" class="tab-panel"></section>
          <section id="users" class="tab-panel"></section>
          <section id="clients" class="tab-panel"></section>
          <section id="templates" class="tab-panel"></section>
          <section id="offres" class="tab-panel"></section>
          <section id="programmes" class="tab-panel"></section>
          <section id="rubriques" class="tab-panel"></section>
          <section id="medias" class="tab-panel"></section>
          <section id="lots" class="tab-panel"></section>
          <section id="publications" class="tab-panel"></section>
        </section>
      </main>
    </div>

    <script src="./app.js" type="module"></script>
  </body>
</html>
