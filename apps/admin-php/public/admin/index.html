<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Abdou Admin</title>
  <style>
    :root {
      --bg: #f5f8fc;
      --panel: #ffffff;
      --line: #d8e1ef;
      --ink: #1f2a37;
      --muted: #5d6b7d;
      --brand: #0f4fa8;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background:
        radial-gradient(circle at 20% 0, #dce8ff 0, transparent 45%),
        radial-gradient(circle at 80% 100%, #d9f0ff 0, transparent 40%),
        var(--bg);
      color: var(--ink);
    }
    .wrap {
      max-width: 980px;
      margin: 24px auto;
      padding: 0 16px;
      display: grid;
      gap: 14px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 12px 26px rgba(16, 24, 40, 0.08);
    }
    h1 {
      margin: 0;
      font-size: 24px;
    }
    .muted {
      color: var(--muted);
      margin-top: 6px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      background: #fff;
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 600;
      background: var(--brand);
      color: #fff;
      cursor: pointer;
    }
    button.secondary {
      background: #2c3e55;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    pre {
      margin: 0;
      background: #0f172a;
      color: #d9e3f0;
      border-radius: 10px;
      padding: 12px;
      min-height: 120px;
      overflow: auto;
      font-size: 12px;
    }
    @media (max-width: 760px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1>Abdou Admin PHP</h1>
      <p class="muted">MVP admin en cours de migration vers OVH Hosting Pro.</p>
    </section>

    <section class="card">
      <div class="grid">
        <div>
          <label for="email">Email</label>
          <input id="email" type="email" value="admin@abdou.local">
        </div>
        <div>
          <label for="password">Mot de passe</label>
          <input id="password" type="password" value="0000">
        </div>
      </div>
      <div class="actions">
        <button id="btn-login" type="button">Login</button>
        <button id="btn-me" type="button" class="secondary">Me</button>
        <button id="btn-users" type="button" class="secondary">Users</button>
        <button id="btn-roles" type="button" class="secondary">Roles</button>
        <button id="btn-offres" type="button" class="secondary">Offres</button>
        <button id="btn-programmes" type="button" class="secondary">Programmes</button>
        <button id="btn-publications" type="button" class="secondary">Publications</button>
        <button id="btn-create-publication" type="button" class="secondary">Create Publication P1</button>
        <button id="btn-deploy-publication" type="button" class="secondary">Deploy Publication 1</button>
        <button id="btn-logout" type="button" class="secondary">Logout</button>
      </div>
    </section>

    <section class="card">
      <pre id="output">Ready.</pre>
    </section>
  </div>

  <script>
    const out = document.getElementById("output");
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const API_BASE = location.pathname.startsWith("/admin") ? "/admin" : "";

    function print(label, payload) {
      const text = typeof payload === "string" ? payload : JSON.stringify(payload, null, 2);
      out.textContent = `[${new Date().toLocaleTimeString()}] ${label}\n${text}`;
    }

    async function call(url, options = {}) {
      const res = await fetch(url, {
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        ...options
      });
      const body = await res.text();
      let parsed = body;
      try { parsed = JSON.parse(body); } catch (_) {}
      print(`${options.method || "GET"} ${url} -> ${res.status}`, parsed);
    }

    document.getElementById("btn-login").onclick = () =>
      call(`${API_BASE}/auth/login`, {
        method: "POST",
        body: JSON.stringify({ email: email.value, password: password.value })
      });
    document.getElementById("btn-me").onclick = () => call(`${API_BASE}/auth/me`);
    document.getElementById("btn-users").onclick = () => call(`${API_BASE}/users`);
    document.getElementById("btn-roles").onclick = () => call(`${API_BASE}/roles`);
    document.getElementById("btn-offres").onclick = () => call(`${API_BASE}/offres`);
    document.getElementById("btn-programmes").onclick = () => call(`${API_BASE}/programmes`);
    document.getElementById("btn-publications").onclick = () => call(`${API_BASE}/publications`);
    document.getElementById("btn-create-publication").onclick = () =>
      call(`${API_BASE}/publications`, {
        method: "POST",
        body: JSON.stringify({ programme_id: 1 })
      });
    document.getElementById("btn-deploy-publication").onclick = () =>
      call(`${API_BASE}/publications/1/deploy`, {
        method: "POST",
        body: JSON.stringify({ target_label: "production", deployment_status: "success" })
      });
    document.getElementById("btn-logout").onclick = () => call(`${API_BASE}/auth/logout`, { method: "POST" });
  </script>
</body>
</html>
