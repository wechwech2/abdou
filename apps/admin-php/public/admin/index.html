<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Abdou Admin</title>
  <style>
    :root {
      --bg: #f5f8fc;
      --panel: #ffffff;
      --line: #d8e1ef;
      --ink: #1f2a37;
      --muted: #5d6b7d;
      --brand: #0f4fa8;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background:
        radial-gradient(circle at 20% 0, #dce8ff 0, transparent 45%),
        radial-gradient(circle at 80% 100%, #d9f0ff 0, transparent 40%),
        var(--bg);
      color: var(--ink);
    }
    .wrap {
      max-width: 980px;
      margin: 24px auto;
      padding: 0 16px;
      display: grid;
      gap: 14px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 12px 26px rgba(16, 24, 40, 0.08);
    }
    h1 {
      margin: 0;
      font-size: 24px;
    }
    .muted {
      color: var(--muted);
      margin-top: 6px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      background: #fff;
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 600;
      background: var(--brand);
      color: #fff;
      cursor: pointer;
    }
    button.secondary {
      background: #2c3e55;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    pre {
      margin: 0;
      background: #0f172a;
      color: #d9e3f0;
      border-radius: 10px;
      padding: 12px;
      min-height: 120px;
      overflow: auto;
      font-size: 12px;
    }
    @media (max-width: 760px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1>Abdou Admin PHP</h1>
      <p class="muted">MVP admin en cours de migration vers OVH Hosting Pro.</p>
    </section>

    <section class="card">
      <div class="grid">
        <div>
          <label for="email">Email</label>
          <input id="email" type="email" value="admin@abdou.local">
        </div>
        <div>
          <label for="password">Mot de passe</label>
          <input id="password" type="password" value="0000">
        </div>
      </div>
      <div class="actions">
        <button id="btn-login" type="button">Login</button>
        <button id="btn-me" type="button" class="secondary">Me</button>
        <button id="btn-users" type="button" class="secondary">Users</button>
        <button id="btn-roles" type="button" class="secondary">Roles</button>
        <button id="btn-offres" type="button" class="secondary">Offres</button>
        <button id="btn-programmes" type="button" class="secondary">Programmes</button>
        <button id="btn-publications" type="button" class="secondary">Publications</button>
        <button id="btn-create-publication" type="button" class="secondary">Create Publication P1</button>
        <button id="btn-deploy-publication" type="button" class="secondary">Deploy Publication 1</button>
        <button id="btn-logout" type="button" class="secondary">Logout</button>
      </div>
    </section>

    <section class="card">
      <h2 style="margin:0 0 10px;font-size:18px;">Edition Contenu Programme</h2>
      <div class="grid">
        <div>
          <label for="programme-id">Programme ID</label>
          <input id="programme-id" type="number" value="1" min="1">
        </div>
        <div>
          <label for="programme-city">Ville</label>
          <input id="programme-city" type="text" placeholder="Tunis">
        </div>
        <div>
          <label for="programme-headline">Headline</label>
          <input id="programme-headline" type="text" placeholder="Une adresse moderne...">
        </div>
        <div>
          <label for="programme-short-description">Description courte</label>
          <input id="programme-short-description" type="text" placeholder="Texte court visible dans le hero">
        </div>
      </div>
      <div style="margin-top:10px;">
        <label for="programme-full-description">Description longue</label>
        <textarea id="programme-full-description" rows="5" style="width:100%;box-sizing:border-box;border:1px solid var(--line);border-radius:8px;padding:10px;font-size:14px;"></textarea>
      </div>
      <div class="actions">
        <button id="btn-load-programme" type="button" class="secondary">Load Programme</button>
        <button id="btn-save-programme" type="button">Save Programme</button>
      </div>
    </section>

    <section class="card">
      <h2 style="margin:0 0 10px;font-size:18px;">Edition Rubrique</h2>
      <div class="grid">
        <div>
          <label for="rubrique-programme-id">Programme ID</label>
          <input id="rubrique-programme-id" type="number" value="1" min="1">
        </div>
        <div>
          <label for="rubrique-id">Rubrique ID</label>
          <input id="rubrique-id" type="number" value="" min="1" placeholder="chargé automatiquement">
        </div>
        <div>
          <label for="rubrique-title">Titre</label>
          <input id="rubrique-title" type="text" placeholder="Environnement">
        </div>
        <div>
          <label for="rubrique-slug">Slug</label>
          <input id="rubrique-slug" type="text" placeholder="environnement">
        </div>
      </div>
      <div style="margin-top:10px;">
        <label for="rubrique-content-text">Contenu texte</label>
        <textarea id="rubrique-content-text" rows="4" style="width:100%;box-sizing:border-box;border:1px solid var(--line);border-radius:8px;padding:10px;font-size:14px;"></textarea>
      </div>
      <div style="margin-top:10px;">
        <label for="rubrique-content-html">Contenu HTML (optionnel)</label>
        <textarea id="rubrique-content-html" rows="4" style="width:100%;box-sizing:border-box;border:1px solid var(--line);border-radius:8px;padding:10px;font-size:14px;"></textarea>
      </div>
      <div class="grid" style="margin-top:10px;">
        <div>
          <label><input id="rubrique-is-enabled" type="checkbox" checked style="width:auto;"> Rubrique active</label>
        </div>
        <div>
          <label><input id="rubrique-is-menu-visible" type="checkbox" checked style="width:auto;"> Visible dans le menu</label>
        </div>
      </div>
      <div class="actions">
        <button id="btn-load-rubriques" type="button" class="secondary">Load Rubriques Programme</button>
        <button id="btn-save-rubrique" type="button">Save Rubrique</button>
      </div>
    </section>

    <section class="card">
      <h2 style="margin:0 0 10px;font-size:18px;">Edition Medias Publies</h2>
      <div class="grid">
        <div>
          <label for="media-programme-id">Programme ID</label>
          <input id="media-programme-id" type="number" value="1" min="1">
        </div>
        <div>
          <label for="media-existing-id">Media ID existant (optionnel)</label>
          <input id="media-existing-id" type="number" value="" min="1" placeholder="laisser vide pour créer">
        </div>
        <div>
          <label for="media-type">Type</label>
          <select id="media-type" style="width:100%;box-sizing:border-box;border:1px solid var(--line);border-radius:8px;padding:10px;font-size:14px;">
            <option value="image">image</option>
            <option value="video">video</option>
            <option value="document">document</option>
          </select>
        </div>
        <div>
          <label for="media-usage-code">Usage code</label>
          <input id="media-usage-code" type="text" value="gallery" placeholder="hero_image | gallery | video | documentation">
        </div>
      </div>
      <div class="grid" style="margin-top:10px;">
        <div>
          <label for="media-public-url">Public URL</label>
          <input id="media-public-url" type="url" placeholder="https://...">
        </div>
        <div>
          <label for="media-title">Titre</label>
          <input id="media-title" type="text" placeholder="Titre media">
        </div>
        <div>
          <label for="media-alt-text">Alt text</label>
          <input id="media-alt-text" type="text" placeholder="Texte alternatif">
        </div>
        <div>
          <label for="media-caption">Caption</label>
          <input id="media-caption" type="text" placeholder="Légende">
        </div>
      </div>
      <div class="grid" style="margin-top:10px;">
        <div>
          <label><input id="media-is-published" type="checkbox" checked style="width:auto;"> Publie</label>
        </div>
        <div>
          <label><input id="media-is-featured" type="checkbox" style="width:auto;"> Featured</label>
        </div>
      </div>
      <div class="actions">
        <button id="btn-load-programme-medias" type="button" class="secondary">Load Programme Medias</button>
        <button id="btn-add-programme-media" type="button">Create/Attach Media</button>
      </div>
    </section>

    <section class="card">
      <h2 style="margin:0 0 10px;font-size:18px;">Edition Batiments</h2>
      <div class="grid">
        <div>
          <label for="batiment-programme-id">Programme ID</label>
          <input id="batiment-programme-id" type="number" value="1" min="1">
        </div>
        <div>
          <label for="batiment-id">Batiment ID (optionnel)</label>
          <input id="batiment-id" type="number" value="" min="1" placeholder="laisser vide pour création">
        </div>
        <div>
          <label for="batiment-code">Code</label>
          <input id="batiment-code" type="text" placeholder="BAT-A">
        </div>
        <div>
          <label for="batiment-name">Nom</label>
          <input id="batiment-name" type="text" placeholder="Bâtiment A">
        </div>
      </div>
      <div class="grid" style="margin-top:10px;">
        <div>
          <label for="batiment-display-order">Ordre</label>
          <input id="batiment-display-order" type="number" value="1" min="1">
        </div>
        <div>
          <label><input id="batiment-is-active" type="checkbox" checked style="width:auto;"> Actif</label>
        </div>
      </div>
      <div class="actions">
        <button id="btn-load-batiments" type="button" class="secondary">Load Batiments</button>
        <button id="btn-save-batiment" type="button">Create/Update Batiment</button>
        <button id="btn-load-etages-batiment" type="button" class="secondary">Load Etages Batiment</button>
      </div>

      <hr style="border:0;border-top:1px solid var(--line);margin:16px 0;">

      <h3 style="margin:0 0 10px;font-size:16px;">Edition Etages</h3>
      <div class="grid">
        <div>
          <label for="etage-id">Etage ID (optionnel)</label>
          <input id="etage-id" type="number" value="" min="1" placeholder="laisser vide pour création">
        </div>
        <div>
          <label for="etage-code">Code</label>
          <input id="etage-code" type="text" placeholder="R+1">
        </div>
        <div>
          <label for="etage-name">Nom</label>
          <input id="etage-name" type="text" placeholder="Etage 1">
        </div>
        <div>
          <label for="etage-level-number">Niveau</label>
          <input id="etage-level-number" type="number" value="1">
        </div>
        <div>
          <label for="etage-display-order">Ordre</label>
          <input id="etage-display-order" type="number" value="1" min="1">
        </div>
      </div>
      <div class="actions">
        <button id="btn-load-etages" type="button" class="secondary">Load Etages</button>
        <button id="btn-save-etage" type="button">Create/Update Etage</button>
      </div>
    </section>

    <section class="card">
      <pre id="output">Ready.</pre>
    </section>
  </div>

  <script>
    const out = document.getElementById("output");
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const API_BASE = location.pathname.startsWith("/admin") ? "/admin" : "";
    const programmeIdInput = document.getElementById("programme-id");
    const programmeCityInput = document.getElementById("programme-city");
    const programmeHeadlineInput = document.getElementById("programme-headline");
    const programmeShortDescriptionInput = document.getElementById("programme-short-description");
    const programmeFullDescriptionInput = document.getElementById("programme-full-description");
    const rubriqueProgrammeIdInput = document.getElementById("rubrique-programme-id");
    const rubriqueIdInput = document.getElementById("rubrique-id");
    const rubriqueTitleInput = document.getElementById("rubrique-title");
    const rubriqueSlugInput = document.getElementById("rubrique-slug");
    const rubriqueContentTextInput = document.getElementById("rubrique-content-text");
    const rubriqueContentHtmlInput = document.getElementById("rubrique-content-html");
    const rubriqueEnabledInput = document.getElementById("rubrique-is-enabled");
    const rubriqueMenuVisibleInput = document.getElementById("rubrique-is-menu-visible");
    const mediaProgrammeIdInput = document.getElementById("media-programme-id");
    const mediaExistingIdInput = document.getElementById("media-existing-id");
    const mediaTypeInput = document.getElementById("media-type");
    const mediaUsageCodeInput = document.getElementById("media-usage-code");
    const mediaPublicUrlInput = document.getElementById("media-public-url");
    const mediaTitleInput = document.getElementById("media-title");
    const mediaAltTextInput = document.getElementById("media-alt-text");
    const mediaCaptionInput = document.getElementById("media-caption");
    const mediaPublishedInput = document.getElementById("media-is-published");
    const mediaFeaturedInput = document.getElementById("media-is-featured");
    const batimentProgrammeIdInput = document.getElementById("batiment-programme-id");
    const batimentIdInput = document.getElementById("batiment-id");
    const batimentCodeInput = document.getElementById("batiment-code");
    const batimentNameInput = document.getElementById("batiment-name");
    const batimentDisplayOrderInput = document.getElementById("batiment-display-order");
    const batimentIsActiveInput = document.getElementById("batiment-is-active");
    const etageIdInput = document.getElementById("etage-id");
    const etageCodeInput = document.getElementById("etage-code");
    const etageNameInput = document.getElementById("etage-name");
    const etageLevelNumberInput = document.getElementById("etage-level-number");
    const etageDisplayOrderInput = document.getElementById("etage-display-order");

    function print(label, payload) {
      const text = typeof payload === "string" ? payload : JSON.stringify(payload, null, 2);
      out.textContent = `[${new Date().toLocaleTimeString()}] ${label}\n${text}`;
    }

    async function call(url, options = {}) {
      const res = await fetch(url, {
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        ...options
      });
      const body = await res.text();
      let parsed = body;
      try { parsed = JSON.parse(body); } catch (_) {}
      print(`${options.method || "GET"} ${url} -> ${res.status}`, parsed);
      return { status: res.status, body: parsed };
    }

    async function loadProgramme() {
      const programmeId = Number(programmeIdInput.value || "1");
      const { body } = await call(`${API_BASE}/programmes/${programmeId}`);
      if (!body || body.ok !== true || !body.item) return;
      const item = body.item;
      programmeCityInput.value = item.city || "";
      programmeHeadlineInput.value = item.headline || "";
      programmeShortDescriptionInput.value = item.short_description || "";
      programmeFullDescriptionInput.value = item.full_description || "";
    }

    async function saveProgramme() {
      const programmeId = Number(programmeIdInput.value || "1");
      await call(`${API_BASE}/programmes/${programmeId}`, {
        method: "PUT",
        body: JSON.stringify({
          city: programmeCityInput.value,
          headline: programmeHeadlineInput.value,
          short_description: programmeShortDescriptionInput.value,
          full_description: programmeFullDescriptionInput.value
        })
      });
    }

    async function loadRubriquesProgramme() {
      const programmeId = Number(rubriqueProgrammeIdInput.value || "1");
      const { body } = await call(`${API_BASE}/rubriques?programme_id=${programmeId}&limit=100`);
      if (!body || body.ok !== true || !Array.isArray(body.items) || body.items.length === 0) return;
      const first = body.items[0];
      rubriqueIdInput.value = first.id || "";
      const { body: detail } = await call(`${API_BASE}/rubriques/${first.id}`);
      if (!detail || detail.ok !== true || !detail.item) return;
      const item = detail.item;
      rubriqueTitleInput.value = item.title || "";
      rubriqueSlugInput.value = item.slug || "";
      rubriqueContentTextInput.value = item.content_text || "";
      rubriqueContentHtmlInput.value = item.content_html || "";
      rubriqueEnabledInput.checked = Number(item.is_enabled || 0) === 1;
      rubriqueMenuVisibleInput.checked = Number(item.is_menu_visible || 0) === 1;
    }

    async function saveRubrique() {
      const rubriqueId = Number(rubriqueIdInput.value || "0");
      if (!rubriqueId) {
        print("SAVE RUBRIQUE", "Rubrique ID manquant. Charge d'abord une rubrique.");
        return;
      }
      await call(`${API_BASE}/rubriques/${rubriqueId}`, {
        method: "PUT",
        body: JSON.stringify({
          title: rubriqueTitleInput.value,
          slug: rubriqueSlugInput.value,
          content_text: rubriqueContentTextInput.value,
          content_html: rubriqueContentHtmlInput.value,
          is_enabled: rubriqueEnabledInput.checked ? 1 : 0,
          is_menu_visible: rubriqueMenuVisibleInput.checked ? 1 : 0
        })
      });
    }

    function inferMime(type, url) {
      const lower = String(url || "").toLowerCase();
      if (type === "image") {
        if (lower.endsWith(".png")) return "image/png";
        if (lower.endsWith(".webp")) return "image/webp";
        return "image/jpeg";
      }
      if (type === "video") {
        if (lower.endsWith(".webm")) return "video/webm";
        if (lower.endsWith(".ogg")) return "video/ogg";
        return "video/mp4";
      }
      if (lower.endsWith(".pdf")) return "application/pdf";
      return "application/octet-stream";
    }

    function inferFilename(url, fallback) {
      try {
        const u = new URL(url);
        const last = u.pathname.split("/").pop();
        return (last && last.trim() !== "") ? last : fallback;
      } catch (_) {
        return fallback;
      }
    }

    async function loadProgrammeMedias() {
      const programmeId = Number(mediaProgrammeIdInput.value || "1");
      await call(`${API_BASE}/programmes/${programmeId}/medias`);
    }

    async function addProgrammeMedia() {
      const programmeId = Number(mediaProgrammeIdInput.value || "1");
      const existingMediaId = Number(mediaExistingIdInput.value || "0");
      const type = mediaTypeInput.value;
      const usageCode = (mediaUsageCodeInput.value || "gallery").trim() || "gallery";
      const publicUrl = (mediaPublicUrlInput.value || "").trim();
      const title = (mediaTitleInput.value || "").trim();
      const altText = (mediaAltTextInput.value || "").trim();
      const caption = (mediaCaptionInput.value || "").trim();
      let mediaId = existingMediaId;

      if (!mediaId) {
        if (!publicUrl) {
          print("ADD MEDIA", "Public URL requise si aucun media_id n'est fourni.");
          return;
        }

        const fallbackName = `${type}-${Date.now()}`;
        const originalFilename = inferFilename(publicUrl, fallbackName);
        const mimeType = inferMime(type, publicUrl);
        const createRes = await call(`${API_BASE}/medias`, {
          method: "POST",
          body: JSON.stringify({
            type,
            mime_type: mimeType,
            original_filename: originalFilename,
            storage_filename: originalFilename,
            storage_path: publicUrl,
            public_url: publicUrl,
            title,
            alt_text: altText,
            caption,
            status: "published"
          })
        });
        if (!createRes.body || createRes.body.ok !== true || !createRes.body.item) {
          return;
        }
        mediaId = Number(createRes.body.item.id || 0);
        mediaExistingIdInput.value = mediaId ? String(mediaId) : "";
      }

      if (!mediaId) {
        print("ADD MEDIA", "Media ID invalide.");
        return;
      }

      await call(`${API_BASE}/programmes/${programmeId}/medias`, {
        method: "POST",
        body: JSON.stringify({
          media_id: mediaId,
          usage_code: usageCode,
          is_published: mediaPublishedInput.checked ? 1 : 0,
          is_featured: mediaFeaturedInput.checked ? 1 : 0
        })
      });
    }

    async function loadBatiments() {
      const programmeId = Number(batimentProgrammeIdInput.value || "1");
      const { body } = await call(`${API_BASE}/batiments?programme_id=${programmeId}&limit=100`);
      if (!body || body.ok !== true || !Array.isArray(body.items) || body.items.length === 0) return;
      const first = body.items[0];
      batimentIdInput.value = first.id || "";
      batimentCodeInput.value = first.code || "";
      batimentNameInput.value = first.name || "";
      batimentDisplayOrderInput.value = String(first.display_order || 1);
      batimentIsActiveInput.checked = Number(first.is_active || 0) === 1;
    }

    async function saveBatiment() {
      const programmeId = Number(batimentProgrammeIdInput.value || "1");
      const id = Number(batimentIdInput.value || "0");
      const payload = {
        programme_id: programmeId,
        code: batimentCodeInput.value,
        name: batimentNameInput.value,
        display_order: Number(batimentDisplayOrderInput.value || "1"),
        is_active: batimentIsActiveInput.checked ? 1 : 0
      };
      if (id > 0) {
        await call(`${API_BASE}/batiments/${id}`, {
          method: "PUT",
          body: JSON.stringify({
            code: payload.code,
            name: payload.name,
            display_order: payload.display_order,
            is_active: payload.is_active
          })
        });
        return;
      }

      const { body } = await call(`${API_BASE}/batiments`, {
        method: "POST",
        body: JSON.stringify(payload)
      });
      const createdId = Number(body && body.item ? body.item.id : 0);
      if (createdId > 0) {
        batimentIdInput.value = String(createdId);
      }
    }

    async function loadEtagesBatiment() {
      const id = Number(batimentIdInput.value || "0");
      if (!id) {
        print("LOAD ETAGES", "Batiment ID manquant.");
        return;
      }
      await call(`${API_BASE}/batiments/${id}/etages`);
    }

    async function loadEtages() {
      const batimentId = Number(batimentIdInput.value || "0");
      if (!batimentId) {
        print("LOAD ETAGES", "Batiment ID manquant.");
        return;
      }
      const { body } = await call(`${API_BASE}/etages?batiment_id=${batimentId}&limit=100`);
      if (!body || body.ok !== true || !Array.isArray(body.items) || body.items.length === 0) return;
      const first = body.items[0];
      etageIdInput.value = first.id || "";
      etageCodeInput.value = first.code || "";
      etageNameInput.value = first.name || "";
      etageLevelNumberInput.value = String(first.level_number || 0);
      etageDisplayOrderInput.value = String(first.display_order || 1);
    }

    async function saveEtage() {
      const batimentId = Number(batimentIdInput.value || "0");
      if (!batimentId) {
        print("SAVE ETAGE", "Batiment ID manquant.");
        return;
      }
      const id = Number(etageIdInput.value || "0");
      const payload = {
        batiment_id: batimentId,
        code: etageCodeInput.value,
        name: etageNameInput.value,
        level_number: Number(etageLevelNumberInput.value || "0"),
        display_order: Number(etageDisplayOrderInput.value || "1")
      };
      if (id > 0) {
        await call(`${API_BASE}/etages/${id}`, {
          method: "PUT",
          body: JSON.stringify({
            code: payload.code,
            name: payload.name,
            level_number: payload.level_number,
            display_order: payload.display_order
          })
        });
        return;
      }
      const { body } = await call(`${API_BASE}/etages`, {
        method: "POST",
        body: JSON.stringify(payload)
      });
      const createdId = Number(body && body.item ? body.item.id : 0);
      if (createdId > 0) {
        etageIdInput.value = String(createdId);
      }
    }
